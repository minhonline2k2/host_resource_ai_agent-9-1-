<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Resource AI Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:#0a0e1a;color:#c9d1d9;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#161b2e}
::-webkit-scrollbar-thumb{background:#3b4261;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .3s ease}
pre{white-space:pre-wrap;word-break:break-all}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const API = "/api/v1";

async function api(path, opts = {}) {
  try {
    const r = await fetch(API + path, { headers: {"Content-Type":"application/json"}, ...opts });
    if (r.ok) return await r.json();
    console.error("API error:", r.status, await r.text());
  } catch(e) { console.error("API fetch error:", e); }
  return null;
}

const ft = s => { if (!s) return "—"; try { const raw = String(s); const d = new Date(raw.endsWith("Z")||raw.includes("+")||raw.includes("-",11) ? raw : raw+"Z"); return d.toLocaleString("vi-VN",{hour12:false,timeZone:"Asia/Ho_Chi_Minh"}); } catch { return s; } };

const SC = {
  new:{bg:"#4b5563",label:"Mới",spin:false},
  deduplicated:{bg:"#4b5563",label:"Trùng lặp",spin:false},
  suppressed:{bg:"#6b7280",label:"Không cảnh báo",spin:false},
  evidence_collecting:{bg:"#2563eb",label:"Đang thu thập",spin:true},
  evidence_collected:{bg:"#1d4ed8",label:"Đã thu thập",spin:false},
  analyzing:{bg:"#7c3aed",label:"Đang phân tích",spin:true},
  analysis_failed:{bg:"#dc2626",label:"Phân tích lỗi",spin:false},
  action_proposed:{bg:"#d97706",label:"Chờ duyệt",spin:false},
  approved:{bg:"#16a34a",label:"Đã duyệt",spin:false},
  canceled:{bg:"#6b7280",label:"Đã hủy",spin:false},
  dispatched:{bg:"#0891b2",label:"Đang gửi",spin:true},
  executing:{bg:"#0e7490",label:"Đang xử lý",spin:true},
  executed:{bg:"#15803d",label:"Đã xử lý",spin:false},
  execution_failed:{bg:"#dc2626",label:"Xử lý lỗi",spin:false},
  resolved:{bg:"#166534",label:"Đã giải quyết",spin:false},
  closed:{bg:"#374151",label:"Đã đóng",spin:false},
  manual_required:{bg:"#b45309",label:"Cần xử lý tay",spin:false},
  monitoring:{bg:"#0284c7",label:"Đang theo dõi",spin:true},
  failed:{bg:"#dc2626",label:"Thất bại",spin:false},
  pending:{bg:"#d97706",label:"Chờ",spin:false},
};
const SevC = {critical:"#ef4444",warning:"#f59e0b",info:"#3b82f6"};
const RiskC = {low:"#22c55e",medium:"#f59e0b",high:"#ef4444",critical:"#dc2626"};

function Badge({bg,children,spin}) {
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,color:"#fff",backgroundColor:bg,whiteSpace:"nowrap"}}>
    {spin && <span style={{display:"inline-block",width:10,height:10,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>}
    {children}
  </span>;
}
function StatusBadge({status}) { const c=SC[status]||SC.new; return <Badge bg={c.bg} spin={c.spin}>{c.label}</Badge>; }
function SevBadge({sev}) { return <Badge bg={SevC[sev]||"#6b7280"}>{sev}</Badge>; }

function ConfBar({v}) {
  if (v==null) return <span style={{color:"#4b5563",fontSize:11}}>—</span>;
  const pct = Math.round(v*100);
  const clr = pct>=80?"#22c55e":pct>=50?"#f59e0b":"#ef4444";
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <div style={{width:48,height:5,backgroundColor:"#1e293b",borderRadius:3,overflow:"hidden"}}>
      <div style={{width:pct+"%",height:"100%",backgroundColor:clr,borderRadius:3,transition:"width .3s"}}/>
    </div>
    <span style={{fontSize:11,color:clr,fontWeight:600,fontFamily:"monospace"}}>{pct}%</span>
  </div>;
}

/* ============= DASHBOARD ============= */
function DashboardPage({stats,incidents,onNav,onDelete}) {
  const cards = [
    {label:"Tổng incidents",value:stats.total,color:"#3b82f6",icon:"📊"},
    {label:"Đang xử lý",value:stats.active,color:"#f59e0b",icon:"⚡"},
    {label:"Chờ duyệt",value:stats.pending_approvals,color:"#ef4444",icon:"🔔"},
  ];
  return <div className="fade-in">
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
      {cards.map((c,i)=><div key={i} style={{background:"linear-gradient(135deg,#141929,#1a2038)",border:"1px solid #252d45",borderRadius:10,padding:20}}>
        <div style={{fontSize:12,color:"#64748b",marginBottom:6}}>{c.icon} {c.label}</div>
        <div style={{fontSize:36,fontWeight:800,color:c.color,fontFamily:"monospace"}}>{c.value}</div>
      </div>)}
    </div>
    <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:10,overflow:"hidden"}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid #252d45",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:600,fontSize:14,color:"#e2e8f0"}}>Incidents gần đây</span>
        <button onClick={()=>onNav("incidents")} style={{fontSize:12,color:"#60a5fa",background:"none",border:"none",cursor:"pointer"}}>Xem tất cả →</button>
      </div>
      {incidents.length === 0 && <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có incident nào</div>}
      {incidents.slice(0,8).map(inc=><div key={inc.id} onClick={()=>onNav("detail",inc.id)} style={{display:"grid",gridTemplateColumns:"1fr 130px 110px 80px 70px 110px 36px",alignItems:"center",padding:"10px 20px",borderBottom:"1px solid #1e2640",cursor:"pointer",fontSize:13,transition:"background .15s"}}
        onMouseEnter={e=>e.currentTarget.style.background="#1a2240"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <div>
          <div style={{color:"#e2e8f0",fontWeight:500}}>{inc.alert_type}</div>
          <div style={{color:"#4b5563",fontSize:11,fontFamily:"monospace"}}>{inc.instance}</div>
        </div>
        <div style={{fontFamily:"monospace",fontSize:10,color:"#64748b"}}>{inc.incident_number}</div>
        <div><StatusBadge status={inc.status}/></div>
        <div><SevBadge sev={inc.severity}/></div>
        <div><ConfBar v={inc.llm_confidence}/></div>
        <div style={{textAlign:"right",fontSize:11,color:"#4b5563"}}>{ft(inc.created_at)}</div>
        <button onClick={e=>{e.stopPropagation();onDelete(inc.id,inc.title)}} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:14,padding:2,lineHeight:1,borderRadius:4}} title="Xóa incident"
          onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#4b5563"}>✕</button>
      </div>)}
    </div>
  </div>;
}

/* ============= DETAIL ============= */
function DetailPage({incidentId,onNav}) {
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);
  const [tab,setTab] = useState("rca");
  const [approving,setApproving] = useState(null);
  const [expandedEv,setExpandedEv] = useState(new Set());

  const loadDetail = useCallback(async ()=>{
    setLoading(true);
    const d = await api("/incidents/"+incidentId);
    setData(d);
    setLoading(false);
  },[incidentId]);

  useEffect(()=>{ loadDetail(); },[loadDetail]);

  const [suppressing,setSuppressing] = useState(false);
  const [monitorMin,setMonitorMin] = useState(15);
  const [checkedCmds,setCheckedCmds] = useState({}); // {optionId: Set of cmd indices}

  const handleSuppress = async () => {
    if (!confirm("Xác nhận đánh dấu incident này là KHÔNG CẦN CẢNH BÁO?\n\nRoot cause tương tự trong tương lai sẽ được ghi nhận nhưng vẫn phải qua phân tích.")) return;
    setSuppressing(true);
    await api("/incidents/"+incidentId+"/suppress",{method:"POST"});
    await loadDetail();
    setSuppressing(false);
  };

  const handleUnsuppress = async () => {
    if (!confirm("Bật lại cảnh báo cho incident này?")) return;
    setSuppressing(true);
    await api("/incidents/"+incidentId+"/unsuppress",{method:"POST"});
    await loadDetail();
    setSuppressing(false);
  };

  const handleMonitor = async () => {
    setSuppressing(true);
    await api("/incidents/"+incidentId+"/monitor",{method:"POST",body:JSON.stringify({duration_minutes:monitorMin})});
    await loadDetail();
    setSuppressing(false);
  };

  const [llmAction,setLlmAction] = useState(false);

  const handleSkipLLM = async () => {
    setLlmAction(true);
    await api("/incidents/"+incidentId+"/skip-llm",{method:"POST"});
    await loadDetail();
    setLlmAction(false);
  };

  const handleQueryLLM = async () => {
    if (!confirm("Gửi dữ liệu đã thu thập lên LLM để phân tích root cause?")) return;
    setLlmAction(true);
    await api("/incidents/"+incidentId+"/query-llm",{method:"POST"});
    // Poll for result since LLM takes time
    const poll = setInterval(async ()=>{
      const d = await api("/incidents/"+incidentId);
      if (d && d.incident.status !== "analyzing") {
        clearInterval(poll);
        setData(d);
        setLlmAction(false);
      }
    }, 3000);
    // Safety timeout
    setTimeout(()=>{ clearInterval(poll); setLlmAction(false); loadDetail(); }, 300000);
  };

  const toggleCmd = (optId, idx) => {
    setCheckedCmds(prev => {
      const s = new Set(prev[optId] || []);
      s.has(idx) ? s.delete(idx) : s.add(idx);
      return {...prev, [optId]: s};
    });
  };

  const selectAllCmds = (optId, cmds) => {
    setCheckedCmds(prev => ({...prev, [optId]: new Set(cmds.map((_,i)=>i))}));
  };

  const handleApprove = async (optId,decision) => {
    setApproving(optId);
    const selectedIndices = checkedCmds[optId] ? Array.from(checkedCmds[optId]).sort() : null;
    await api("/approvals",{method:"POST",body:JSON.stringify({
      action_proposal_id:optId, decision, decided_by:"operator",
      selected_commands: decision==="approved" ? selectedIndices : null,
    })});
    await loadDetail();
    setApproving(null);
  };

  if (loading) return <div style={{textAlign:"center",padding:60,color:"#64748b"}}>
    <span style={{display:"inline-block",width:24,height:24,border:"3px solid #1e293b",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    <div style={{marginTop:12}}>Đang tải...</div>
  </div>;
  if (!data) return <div style={{textAlign:"center",padding:60,color:"#ef4444"}}>Không tìm thấy incident</div>;

  const inc = data.incident;
  const tabs = [
    {id:"rca",label:"🔍 Root Cause"},
    {id:"prompt",label:"🤖 Prompt LLM"},
    {id:"llm_resp",label:"📩 LLM Response"},
    {id:"evidence",label:"📋 Bằng chứng ("+((data.evidence||[]).length)+")"},
    {id:"actions",label:"⚡ Phương án ("+((data.action_proposals||[]).length)+")"},
    {id:"exec",label:"🖥 Thực thi"},
    {id:"timeline",label:"📅 Timeline"},
  ];

  return <div className="fade-in">
    <button onClick={()=>onNav("incidents")} style={{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",marginBottom:16,fontSize:13,padding:0}}>← Quay lại</button>

    {/* Header card */}
    <div style={{background:"linear-gradient(135deg,#141929,#1a2038)",border:"1px solid #252d45",borderRadius:10,padding:20,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:10,color:"#4b5563",fontFamily:"monospace",marginBottom:4}}>{inc.incident_number}</div>
          <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",margin:0}}>{inc.title}</h2>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <StatusBadge status={inc.status}/><SevBadge sev={inc.severity}/>
          {/* Skip LLM button — for new/collecting incidents */}
          {(inc.status==="new"||inc.status==="evidence_collecting") && <button onClick={handleSkipLLM} disabled={llmAction}
            style={{padding:"4px 10px",fontSize:11,fontWeight:600,background:"#7c3aed",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",marginLeft:8}}
            title="Chỉ thu thập dữ liệu, không gửi LLM">
            {llmAction?"...":"⏸ Bỏ qua LLM"}
          </button>}
          {/* Query LLM button — for evidence_collected or analysis_failed */}
          {(inc.status==="evidence_collected"||inc.status==="analysis_failed"||inc.status==="manual_required") && <button onClick={handleQueryLLM} disabled={llmAction}
            style={{padding:"4px 10px",fontSize:11,fontWeight:600,background:llmAction?"#4b5563":"#2563eb",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",marginLeft:8,animation:llmAction?"pulse 1s infinite":"none"}}
            title="Gửi dữ liệu đã thu thập lên LLM phân tích">
            {llmAction?"🤖 Đang phân tích...":"🤖 Query LLM"}
          </button>}
          {/* Unsuppress button for suppressed incidents */}
          {inc.status==="suppressed" && <button onClick={handleUnsuppress} disabled={suppressing}
            style={{padding:"4px 10px",fontSize:11,fontWeight:600,background:"#dc2626",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",marginLeft:8}}
            title="Bật lại cảnh báo cho incident này">
            {suppressing?"...":"🔔 Bật cảnh báo lại"}
          </button>}
          {/* Suppress button only when RCA is done */}
          {inc.status!=="suppressed" && inc.status!=="closed" && inc.status!=="monitoring" && inc.root_cause_summary && <button onClick={handleSuppress} disabled={suppressing}
            style={{padding:"4px 10px",fontSize:11,fontWeight:600,background:"transparent",color:"#64748b",border:"1px solid #374151",borderRadius:4,cursor:"pointer",marginLeft:8}}
            title="Đánh dấu incident này là noise / không cần cảnh báo">
            {suppressing?"...":"🔕 Không cảnh báo"}
          </button>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,fontSize:12}}>
        <div><span style={{color:"#4b5563"}}>Instance:</span> <span style={{color:"#94a3b8",fontFamily:"monospace"}}>{inc.instance}</span></div>
        <div><span style={{color:"#4b5563"}}>Resource:</span> <span style={{color:"#94a3b8"}}>{inc.resource_type||"—"}</span></div>
        <div><span style={{color:"#4b5563"}}>Nguồn RCA:</span> <span style={{color:inc.knowledge_source==="llm"?"#a78bfa":inc.knowledge_source==="rule"?"#34d399":"#94a3b8"}}>{inc.knowledge_source||"—"}</span></div>
        <div><span style={{color:"#4b5563"}}>Confidence:</span> <ConfBar v={inc.llm_confidence}/></div>
      </div>
    </div>

    {/* LLM skipped banner */}
    {inc.status==="evidence_collected" && !inc.root_cause_summary && <div style={{background:"#1e1b4b",border:"1px solid #4338ca",borderLeft:"3px solid #7c3aed",borderRadius:6,padding:16,marginBottom:16}}>
      <div style={{fontSize:12,color:"#a78bfa",fontWeight:700,marginBottom:6}}>⏸ LLM CHƯA ĐƯỢC GỌI</div>
      <div style={{color:"#c4b5fd",fontSize:13,lineHeight:1.6}}>
        Dữ liệu đã thu thập ({(data.evidence||[]).length} bằng chứng). Nhấn <strong>"🤖 Query LLM"</strong> để phân tích root cause.
      </div>
    </div>}

    {/* RCA Summary */}
    {inc.root_cause_summary && <div style={{background:"#14192e",border:"1px solid #252d45",borderLeft:"3px solid #f59e0b",borderRadius:6,padding:16,marginBottom:16}}>
      <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginBottom:6,letterSpacing:".05em"}}>ROOT CAUSE SUMMARY</div>
      <div style={{color:"#e2e8f0",fontSize:14,lineHeight:1.7}}>{inc.root_cause_summary}</div>
    </div>}

    {/* Tabs */}
    <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"1px solid #252d45"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{
        padding:"10px 16px",fontSize:12,fontWeight:500,border:"none",
        borderBottom:tab===t.id?"2px solid #60a5fa":"2px solid transparent",
        color:tab===t.id?"#60a5fa":"#64748b",backgroundColor:"transparent",cursor:"pointer",transition:"all .15s",
      }}>{t.label}</button>)}
    </div>

    {/* === RCA TAB === */}
    {tab==="rca" && <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:12}}>
      {data.llm_analysis ? <>
        <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8,letterSpacing:".05em"}}>PHÂN TÍCH CHI TIẾT</div>
          <div style={{color:"#c9d1d9",fontSize:13,lineHeight:1.7}}>{data.llm_analysis.summary}</div>
        </div>
        {(data.llm_analysis.root_causes||[]).map((rc,i)=><div key={i} style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontWeight:600,color:"#e2e8f0",fontSize:14}}>{rc.name}</span>
            <ConfBar v={rc.confidence}/>
          </div>
          <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.6}}>{rc.why}</div>
          {rc.evidence_refs?.length>0 && <div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
            {rc.evidence_refs.map((r,j)=><span key={j} style={{fontSize:10,padding:"2px 6px",background:"#1e2640",borderRadius:3,color:"#64748b",fontFamily:"monospace"}}>{r}</span>)}
          </div>}
        </div>)}
      </> : <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có phân tích RCA</div>}
    </div>}

    {/* === PROMPT TAB === */}
    {tab==="prompt" && <div className="fade-in">
      {inc.llm_prompt_text ? <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #252d45",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#a78bfa",letterSpacing:".05em"}}>🤖 PROMPT GỬI LÊN LLM ({inc.llm_prompt_text.length.toLocaleString()} ký tự)</span>
          <button onClick={()=>{navigator.clipboard.writeText(inc.llm_prompt_text);alert("Đã copy prompt!")}} style={{fontSize:11,padding:"4px 10px",background:"#252d45",color:"#94a3b8",border:"none",borderRadius:4,cursor:"pointer"}}>📋 Copy</button>
        </div>
        <pre style={{margin:0,padding:16,fontSize:11,color:"#c9d1d9",background:"#0a0e1a",overflow:"auto",maxHeight:"70vh",fontFamily:"'Cascadia Code','Fira Code',monospace",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{inc.llm_prompt_text}</pre>
      </div> : <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có prompt (incident chưa gửi LLM)</div>}
    </div>}

    {/* === LLM RESPONSE TAB === */}
    {tab==="llm_resp" && <div className="fade-in">
      {inc.llm_raw_response ? (() => {
        let parsed = null;
        try { parsed = JSON.parse(inc.llm_raw_response); } catch {}
        return parsed ? <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Summary */}
          <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:6,letterSpacing:".05em"}}>📩 LLM RESPONSE (parsed)</div>
            <div style={{color:"#e2e8f0",fontSize:13,lineHeight:1.6,marginBottom:8}}>{parsed.summary||parsed.operator_message_vi||"—"}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,fontSize:12}}>
              <div><span style={{color:"#4b5563"}}>Confidence:</span> <span style={{color:"#f59e0b",fontWeight:700}}>{parsed.confidence}</span></div>
              <div><span style={{color:"#4b5563"}}>RCA Level:</span> <span style={{color:"#94a3b8"}}>{parsed.rca_level||"—"}</span></div>
              <div><span style={{color:"#4b5563"}}>Impact:</span> <span style={{color:"#94a3b8"}}>{parsed.impact||"—"}</span></div>
            </div>
          </div>
          {/* Root cause chain */}
          <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:8}}>ROOT CAUSE CHAIN</div>
            <div style={{fontSize:12,lineHeight:1.8}}>
              <div><span style={{color:"#4b5563"}}>Symptom:</span> <span style={{color:"#e2e8f0"}}>{parsed.symptom||"—"}</span></div>
              <div><span style={{color:"#4b5563"}}>Immediate cause:</span> <span style={{color:"#e2e8f0"}}>{parsed.immediate_cause||"—"}</span></div>
              <div><span style={{color:"#4b5563"}}>Root cause hypothesis:</span> <span style={{color:"#fbbf24",fontWeight:600}}>{parsed.root_cause_hypothesis||"—"}</span></div>
              <div><span style={{color:"#4b5563"}}>Why not just symptom:</span> <span style={{color:"#94a3b8"}}>{parsed.why_not_just_symptom||"—"}</span></div>
              <div><span style={{color:"#4b5563"}}>Canonical:</span> <span style={{color:"#67e8f9",fontFamily:"monospace"}}>{parsed.canonical_root_cause||"—"}</span></div>
              {parsed.contributing_factors?.length>0 && <div><span style={{color:"#4b5563"}}>Contributing factors:</span> <span style={{color:"#94a3b8"}}>{parsed.contributing_factors.join(", ")}</span></div>}
              {parsed.what_is_still_unknown?.length>0 && <div><span style={{color:"#4b5563"}}>Unknown:</span> <span style={{color:"#f87171"}}>{parsed.what_is_still_unknown.join(", ")}</span></div>}
            </div>
          </div>
          {/* Root causes ranked */}
          {parsed.root_causes?.length>0 && <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:8}}>ROOT CAUSES (ranked)</div>
            {parsed.root_causes.map((rc,i)=><div key={i} style={{padding:"8px 0",borderBottom:i<parsed.root_causes.length-1?"1px solid #1e2640":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:"#e2e8f0",fontWeight:500}}>{rc.name}</span>
                <span style={{color:"#f59e0b",fontFamily:"monospace",fontSize:12}}>{(rc.confidence*100).toFixed(0)}%</span>
              </div>
              <div style={{color:"#94a3b8",fontSize:11,marginTop:4}}>{rc.why}</div>
            </div>)}
          </div>}
          {/* Remediation options from LLM */}
          {parsed.remediation_options?.length>0 && <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:8}}>REMEDIATION OPTIONS ({parsed.remediation_options.length})</div>
            {parsed.remediation_options.map((opt,i)=><div key={i} style={{padding:"10px 0",borderBottom:i<parsed.remediation_options.length-1?"1px solid #1e2640":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:11,fontWeight:800,color:"#4b5563"}}>#{opt.priority||i+1}</span>
                <span style={{color:"#e2e8f0",fontWeight:500}}>{opt.title}</span>
                <Badge bg={RiskC[opt.risk_level]||"#6b7280"}>{opt.risk_level}</Badge>
                {parsed.recommended_option===opt.option_id && <Badge bg="#22c55e">recommended</Badge>}
              </div>
              <div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>{opt.description}</div>
              {opt.commands?.length>0 && <div style={{marginTop:4}}>
                <div style={{fontSize:10,color:"#4b5563"}}>Commands ({opt.commands.length}):</div>
                <pre style={{margin:"2px 0 0",padding:6,fontSize:10,background:"#0a0e1a",borderRadius:4,color:"#67e8f9",fontFamily:"monospace"}}>{opt.commands.join("\n")}</pre>
              </div>}
              {opt.expected_effect && <div style={{fontSize:11,color:"#86efac",marginTop:4}}>→ {opt.expected_effect}</div>}
              {opt.rollback_commands?.length>0 && <div style={{fontSize:10,color:"#64748b",marginTop:2}}>Rollback: {opt.rollback_commands.join("; ")}</div>}
              {opt.warnings?.length>0 && <div style={{fontSize:10,color:"#fbbf24",marginTop:2}}>⚠ {opt.warnings.join("; ")}</div>}
            </div>)}
          </div>}
          {/* Operator message */}
          {parsed.operator_message_vi && <div style={{background:"#14192e",border:"1px solid #252d45",borderLeft:"3px solid #22c55e",borderRadius:6,padding:12}}>
            <div style={{fontSize:11,color:"#22c55e",fontWeight:600,marginBottom:4}}>TIN NHẮN CHO OPERATOR</div>
            <div style={{color:"#e2e8f0",fontSize:13}}>{parsed.operator_message_vi}</div>
          </div>}
          {/* Raw JSON toggle */}
          <details style={{background:"#141929",border:"1px solid #252d45",borderRadius:8}}>
            <summary style={{padding:"10px 16px",fontSize:12,color:"#4b5563",cursor:"pointer"}}>Xem JSON gốc</summary>
            <pre style={{margin:0,padding:16,fontSize:10,color:"#94a3b8",background:"#0a0e1a",overflow:"auto",maxHeight:400,fontFamily:"monospace",borderTop:"1px solid #252d45"}}>{JSON.stringify(parsed,null,2)}</pre>
          </details>
        </div> : <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #252d45"}}>
            <span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>⚠️ LLM response không parse được JSON</span>
          </div>
          <pre style={{margin:0,padding:16,fontSize:11,color:"#f87171",background:"#0a0e1a",overflow:"auto",maxHeight:"70vh",fontFamily:"monospace",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{inc.llm_raw_response}</pre>
        </div>;
      })() : <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>
        Chưa có response từ LLM.
        {inc.knowledge_source==="rule_fallback" && <div style={{marginTop:8,color:"#f59e0b"}}>⚠️ LLM call thất bại, đang dùng rule-based fallback. Xem log worker để biết chi tiết.</div>}
      </div>}
    </div>}

    {/* === EVIDENCE TAB === */}
    {tab==="evidence" && <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:6}}>
      {(data.evidence||[]).length===0 && <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có bằng chứng</div>}
      {(data.evidence||[]).map(ev=><div key={ev.id} style={{background:"#141929",border:ev.is_key_evidence?"1px solid #d97706":"1px solid #252d45",borderRadius:8,overflow:"hidden"}}>
        <div onClick={()=>setExpandedEv(p=>{const n=new Set(p);n.has(ev.id)?n.delete(ev.id):n.add(ev.id);return n;})}
          style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",cursor:"pointer",transition:"background .15s"}}
          onMouseEnter={e=>e.currentTarget.style.background="#1a2240"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {ev.is_key_evidence && <span style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b",boxShadow:"0 0 6px #f59e0b"}}/>}
            <span style={{fontFamily:"monospace",fontSize:12,color:"#60a5fa"}}>{ev.command_id}</span>
            <span style={{fontSize:10,padding:"1px 6px",background:"#1e2640",borderRadius:3,color:"#64748b"}}>{ev.evidence_type}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#4b5563"}}>
            {ev.duration_ms!=null && <span>{ev.duration_ms}ms</span>}
            <span style={{color:ev.exit_code===0?"#22c55e":"#ef4444",fontFamily:"monospace"}}>exit={ev.exit_code}</span>
            <span style={{transition:"transform .2s",transform:expandedEv.has(ev.id)?"rotate(180deg)":"rotate(0)"}}>▼</span>
          </div>
        </div>
        {expandedEv.has(ev.id) && <div style={{borderTop:"1px solid #252d45"}}>
          <div style={{padding:"6px 16px",fontSize:11,color:"#4b5563",fontFamily:"monospace",background:"#0f1322"}}>$ {ev.command_text}</div>
          <pre style={{margin:0,padding:"10px 16px",fontSize:11,color:"#c9d1d9",background:"#0a0e1a",overflow:"auto",maxHeight:300,fontFamily:"'Cascadia Code','Fira Code',monospace",lineHeight:1.5}}>{ev.raw_text||"(no output)"}</pre>
        </div>}
      </div>)}
    </div>}

    {/* === ACTIONS TAB === */}
    {tab==="actions" && <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:12}}>
      {(data.action_proposals||[]).length===0 && <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có phương án xử lý</div>}
      {(data.action_proposals||[]).map(opt=>{
        const cmds = opt.commands||[];
        const checked = checkedCmds[opt.id] || new Set();
        return <div key={opt.id} style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:800,color:"#4b5563",fontFamily:"monospace"}}>#{opt.priority}</span>
              <span style={{fontWeight:600,color:"#e2e8f0",fontSize:14}}>{opt.title}</span>
              <Badge bg={RiskC[opt.risk_level]||"#6b7280"}>{opt.risk_level}</Badge>
            </div>
            <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.5}}>{opt.description}</div>
          </div>
          <StatusBadge status={opt.status}/>
        </div>

        {/* Command steps with checkboxes */}
        {cmds.length>0 && <div style={{marginTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:10,color:"#4b5563",fontWeight:600,letterSpacing:".05em"}}>CÁC BƯỚC THỰC HIỆN</span>
            {opt.status==="pending" && <button onClick={()=>selectAllCmds(opt.id,cmds)} style={{fontSize:10,color:"#60a5fa",background:"none",border:"none",cursor:"pointer"}}>Chọn tất cả</button>}
          </div>
          {cmds.map((cmd,ci)=><label key={ci} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 10px",background:checked.has(ci)?"#1a2240":"#0f1322",border:"1px solid "+(checked.has(ci)?"#3b82f6":"#1e2640"),borderRadius:4,marginBottom:4,cursor:opt.status==="pending"?"pointer":"default",transition:"all .15s"}}>
            {opt.status==="pending" && <input type="checkbox" checked={checked.has(ci)} onChange={()=>toggleCmd(opt.id,ci)}
              style={{marginTop:2,accentColor:"#3b82f6",cursor:"pointer"}}/>}
            {opt.status!=="pending" && <span style={{color:opt.status==="approved"||opt.status==="executed"?"#22c55e":"#4b5563",marginTop:1}}>
              {opt.status==="approved"||opt.status==="executed"?"✓":"○"}
            </span>}
            <pre style={{margin:0,fontSize:11,color:checked.has(ci)?"#67e8f9":"#94a3b8",fontFamily:"monospace",whiteSpace:"pre-wrap",wordBreak:"break-all",flex:1}}>{cmd}</pre>
          </label>)}
        </div>}

        {opt.expected_effect && <div style={{marginTop:8,fontSize:12}}><span style={{color:"#4b5563"}}>Kỳ vọng: </span><span style={{color:"#86efac"}}>{opt.expected_effect}</span></div>}
        {opt.warnings?.length>0 && <div style={{marginTop:6,fontSize:11,color:"#fbbf24"}}>⚠ {opt.warnings.join("; ")}</div>}

        {opt.rollback_commands?.length>0 && <div style={{marginTop:8}}>
          <div style={{fontSize:10,color:"#4b5563",marginBottom:3,fontWeight:600}}>ROLLBACK</div>
          <pre style={{margin:0,padding:6,fontSize:10,background:"#0f1322",borderRadius:4,color:"#64748b",fontFamily:"monospace"}}>{opt.rollback_commands.join("\n")}</pre>
        </div>}

        {opt.status==="pending" && <div style={{marginTop:14,display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>handleApprove(opt.id,"approved")} disabled={approving===opt.id || (cmds.length>0 && checked.size===0)}
            style={{padding:"7px 20px",fontSize:12,fontWeight:600,background:(cmds.length>0 && checked.size===0)?"#374151":"#16a34a",color:"#fff",border:"none",borderRadius:6,cursor:(cmds.length>0 && checked.size===0)?"not-allowed":"pointer",opacity:approving===opt.id?.5:1}}>
            {approving===opt.id?"Đang xử lý...":("✓ Duyệt"+(checked.size>0?" ("+checked.size+" bước)":""))}
          </button>
          <button onClick={()=>handleApprove(opt.id,"canceled")} disabled={approving===opt.id}
            style={{padding:"7px 20px",fontSize:12,fontWeight:600,background:"transparent",color:"#94a3b8",border:"1px solid #374151",borderRadius:6,cursor:"pointer"}}>
            ✕ Hủy
          </button>
        </div>}
      </div>;})}

      {/* Monitor option — always present */}
      {inc.status==="action_proposed" && <div style={{background:"#141929",border:"1px solid #0284c7",borderRadius:8,padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:800,color:"#4b5563",fontFamily:"monospace"}}>👁</span>
          <span style={{fontWeight:600,color:"#e2e8f0",fontSize:14}}>Theo dõi thêm</span>
          <Badge bg="#0284c7">monitor</Badge>
        </div>
        <div style={{color:"#94a3b8",fontSize:12,marginBottom:10}}>
          Tạm thời dedup alert này trong thời gian theo dõi. Nếu alert vẫn firing sau thời gian sẽ tạo incident mới.
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:"#64748b"}}>Thời gian:</span>
          <input type="number" value={monitorMin} onChange={e=>setMonitorMin(Math.max(1,Math.min(1440,parseInt(e.target.value)||15)))}
            style={{width:60,padding:"4px 8px",fontSize:12,background:"#0f1322",color:"#e2e8f0",border:"1px solid #252d45",borderRadius:4,textAlign:"center"}}/>
          <span style={{fontSize:12,color:"#64748b"}}>phút</span>
          <button onClick={handleMonitor} disabled={suppressing}
            style={{padding:"7px 16px",fontSize:12,fontWeight:600,background:"#0284c7",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",marginLeft:8}}>
            {suppressing?"...":"👁 Theo dõi"}
          </button>
        </div>
      </div>}
    </div>}

    {/* === EXECUTION TAB === */}
    {tab==="exec" && <div className="fade-in" style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
      {(data.execution_results||[]).length>0 ? data.execution_results.map(ex=><div key={ex.id} style={{padding:"10px 0",borderBottom:"1px solid #1e2640"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
          <span style={{color:"#c9d1d9"}}>Step {ex.step_no}: {ex.step_name||"execute"}</span>
          <Badge bg={ex.status==="success"?"#16a34a":"#dc2626"}>{ex.status}</Badge>
        </div>
        {ex.command && <pre style={{margin:0,padding:8,fontSize:11,background:"#0a0e1a",borderRadius:4,color:"#67e8f9",fontFamily:"monospace"}}>{ex.command}</pre>}
        {ex.stdout && <pre style={{margin:"4px 0 0",padding:8,fontSize:10,background:"#0f1322",borderRadius:4,color:"#94a3b8",fontFamily:"monospace",maxHeight:150,overflow:"auto"}}>{ex.stdout}</pre>}
        {ex.stderr && <pre style={{margin:"4px 0 0",padding:8,fontSize:10,background:"#1a0a0a",borderRadius:4,color:"#f87171",fontFamily:"monospace",maxHeight:100,overflow:"auto"}}>{ex.stderr}</pre>}
      </div>) : <div style={{color:"#4b5563",fontSize:13,textAlign:"center",padding:30}}>Chưa có kết quả thực thi</div>}
    </div>}

    {/* === TIMELINE TAB === */}
    {tab==="timeline" && <div className="fade-in" style={{background:"#141929",border:"1px solid #252d45",borderRadius:8,padding:16}}>
      {(data.events||[]).length===0 && <div style={{padding:30,textAlign:"center",color:"#4b5563"}}>Chưa có event</div>}
      {(data.events||[]).map((ev,i)=><div key={i} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:i<data.events.length-1?"1px solid #1e2640":"none"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:20}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6",boxShadow:"0 0 6px rgba(59,130,246,.4)"}}/>
          {i<data.events.length-1 && <div style={{width:1,flex:1,background:"#1e2640",marginTop:4}}/>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:"#c9d1d9",fontWeight:500}}>{ev.event_type.replace(/_/g," ")}</div>
          <div style={{fontSize:11,color:"#4b5563"}}>{ft(ev.created_at)}</div>
          {ev.event_data && <div style={{fontSize:10,color:"#374151",fontFamily:"monospace",marginTop:2}}>
            {Object.entries(ev.event_data).map(([k,v])=>k+"="+JSON.stringify(v)).join("  ")}
          </div>}
        </div>
      </div>)}
    </div>}
  </div>;
}

/* ============= AUDIT ============= */
function AuditPage() {
  const [audit,setAudit] = useState([]);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{ (async()=>{ const d=await api("/audit"); setAudit(d||[]); setLoading(false); })(); },[]);

  return <div className="fade-in">
    <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",marginBottom:16}}>Audit Log</h2>
    {loading ? <div style={{textAlign:"center",padding:40,color:"#4b5563"}}>Đang tải...</div> :
    <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"150px 160px 90px 80px 1fr",padding:"8px 16px",borderBottom:"1px solid #252d45",fontSize:10,color:"#4b5563",textTransform:"uppercase",fontWeight:700,letterSpacing:".05em"}}>
        <span>Thời gian</span><span>Event</span><span>Entity</span><span>Actor</span><span>Details</span>
      </div>
      {audit.length===0 && <div style={{padding:30,textAlign:"center",color:"#4b5563"}}>Chưa có audit log</div>}
      {audit.map(a=><div key={a.id} style={{display:"grid",gridTemplateColumns:"150px 160px 90px 80px 1fr",alignItems:"center",padding:"8px 16px",borderBottom:"1px solid #1e2640",fontSize:12}}>
        <span style={{color:"#4b5563",fontFamily:"monospace",fontSize:11}}>{ft(a.created_at)}</span>
        <span style={{color:"#60a5fa"}}>{a.event_type}</span>
        <span style={{color:"#94a3b8"}}>{a.entity_type||"—"}</span>
        <span style={{color:a.actor==="system"?"#4b5563":"#f59e0b"}}>{a.actor}</span>
        <span style={{color:"#374151",fontSize:11,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {a.details?Object.entries(a.details).map(([k,v])=>k+"="+JSON.stringify(v)).join("  "):""}
        </span>
      </div>)}
    </div>}
  </div>;
}

/* ============= MAIN APP ============= */
function App() {
  const [page,setPage] = useState("dashboard");
  const [selectedId,setSelectedId] = useState(null);
  const [stats,setStats] = useState({total:0,active:0,pending_approvals:0});
  const [incidents,setIncidents] = useState([]);
  const [sideOpen,setSideOpen] = useState(true);
  const [connected,setConnected] = useState(false);

  const refresh = useCallback(async () => {
    const [s,inc] = await Promise.all([api("/incidents/stats"),api("/incidents")]);
    if (s) { setStats(s); setConnected(true); }
    if (inc) setIncidents(inc);
  },[]);

  useEffect(()=>{ refresh(); const t=setInterval(refresh,10000); return ()=>clearInterval(t); },[refresh]);

  // SSE
  useEffect(()=>{
    let es;
    try {
      es = new EventSource(API+"/events/stream");
      es.onmessage = (e) => {
        try { const d=JSON.parse(e.data); console.log("SSE:",d); refresh(); } catch {}
      };
      es.onerror = () => { setConnected(false); };
      es.onopen = () => { setConnected(true); };
    } catch {}
    return ()=>{ if(es) es.close(); };
  },[refresh]);

  const handleDelete = async (id,title) => {
    if (!confirm("Xóa incident này khỏi DB?\n\n"+title)) return;
    await api("/incidents/"+id,{method:"DELETE"});
    refresh();
  };

  const nav = (p,id) => { setPage(p); setSelectedId(id||null); };

  const menu = [
    {id:"dashboard",label:"Dashboard",icon:"◉"},
    {id:"incidents",label:"Incidents",icon:"▤"},
    {id:"audit",label:"Audit Log",icon:"📋"},
  ];

  return <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
    {/* Sidebar */}
    <div style={{width:sideOpen?200:52,background:"#060a14",borderRight:"1px solid #151d30",display:"flex",flexDirection:"column",transition:"width .2s",flexShrink:0,overflow:"hidden"}}>
      <div style={{padding:12,borderBottom:"1px solid #151d30",display:"flex",alignItems:"center",gap:8,minHeight:48}}>
        <button onClick={()=>setSideOpen(!sideOpen)} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:20,padding:2,lineHeight:1}}>⚡</button>
        {sideOpen && <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0",whiteSpace:"nowrap"}}>AI Alert Agent</span>}
      </div>
      <nav style={{flex:1,padding:8,display:"flex",flexDirection:"column",gap:2}}>
        {menu.map(m=><button key={m.id} onClick={()=>nav(m.id)} style={{
          display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,
          background:page===m.id||(m.id==="incidents"&&page==="detail")?"#141929":"transparent",
          color:page===m.id||(m.id==="incidents"&&page==="detail")?"#e2e8f0":"#4b5563",transition:"all .15s",
        }}>
          <span style={{fontSize:14,width:20,textAlign:"center"}}>{m.icon}</span>
          {sideOpen && <span>{m.label}</span>}
          {sideOpen && m.id==="incidents" && stats.pending_approvals>0 && <span style={{marginLeft:"auto",background:"#ef4444",color:"#fff",fontSize:10,padding:"1px 6px",borderRadius:10,fontWeight:700}}>{stats.pending_approvals}</span>}
        </button>)}
      </nav>
      {sideOpen && <div style={{padding:12,borderTop:"1px solid #151d30",fontSize:10,color:"#2d3654"}}>
        <div>Host Resource AI Agent v1.0</div>
        <div>Gemini 2.0 Flash</div>
        <div>{incidents.length} incidents</div>
      </div>}
    </div>

    {/* Main */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{height:48,background:"#0a0e1a",borderBottom:"1px solid #151d30",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",flexShrink:0}}>
        <h1 style={{fontSize:14,fontWeight:600,color:"#64748b",margin:0}}>
          {page==="dashboard"&&"Dashboard"}
          {page==="incidents"&&"All Incidents"}
          {page==="detail"&&"Incident Detail"}
          {page==="audit"&&"Audit Log"}
        </h1>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={refresh} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:16}} title="Refresh">↻</button>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#4b5563"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:connected?"#22c55e":"#ef4444",boxShadow:connected?"0 0 6px #22c55e":"0 0 6px #ef4444",animation:connected?"pulse 2s infinite":"none"}}/>
            <span>{connected?"Connected":"Disconnected"}</span>
          </div>
          <span style={{fontSize:11,padding:"3px 8px",background:"#141929",borderRadius:4,color:"#64748b",border:"1px solid #252d45"}}>operator</span>
        </div>
      </header>

      <main style={{flex:1,overflow:"auto",padding:20}}>
        {page==="dashboard" && <DashboardPage stats={stats} incidents={incidents} onNav={nav} onDelete={handleDelete}/>}
        {page==="incidents" && <div className="fade-in">
          <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",marginBottom:16}}>All Incidents</h2>
          <div style={{background:"#141929",border:"1px solid #252d45",borderRadius:10,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 80px 70px 110px 36px",padding:"8px 20px",borderBottom:"1px solid #252d45",fontSize:10,color:"#4b5563",textTransform:"uppercase",fontWeight:700,letterSpacing:".05em"}}>
              <span>Alert</span><span>Number</span><span>Status</span><span>Sev.</span><span>Conf.</span><span style={{textAlign:"right"}}>Created</span><span></span>
            </div>
            {incidents.length===0 && <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>Chưa có incident nào</div>}
            {incidents.map(inc=><div key={inc.id} onClick={()=>nav("detail",inc.id)}
              style={{display:"grid",gridTemplateColumns:"1fr 140px 110px 80px 70px 110px 36px",alignItems:"center",padding:"10px 20px",borderBottom:"1px solid #1e2640",cursor:"pointer",fontSize:13,transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="#1a2240"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div>
                <div style={{color:"#e2e8f0",fontWeight:500}}>{inc.alert_type}</div>
                <div style={{color:"#4b5563",fontSize:11,fontFamily:"monospace"}}>{inc.instance}</div>
              </div>
              <div style={{fontFamily:"monospace",fontSize:10,color:"#64748b"}}>{inc.incident_number}</div>
              <div><StatusBadge status={inc.status}/></div>
              <div><SevBadge sev={inc.severity}/></div>
              <div><ConfBar v={inc.llm_confidence}/></div>
              <div style={{textAlign:"right",fontSize:11,color:"#4b5563"}}>{ft(inc.created_at)}</div>
              <button onClick={e=>{e.stopPropagation();handleDelete(inc.id,inc.title)}} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:14,padding:2,lineHeight:1,borderRadius:4}} title="Xóa incident"
                onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#4b5563"}>✕</button>
            </div>)}
          </div>
        </div>}
        {page==="detail" && <DetailPage incidentId={selectedId} onNav={nav}/>}
        {page==="audit" && <AuditPage/>}
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
