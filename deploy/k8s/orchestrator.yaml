apiVersion: apps/v1
kind: Deployment
metadata: { name: orchestrator, namespace: ai-alert-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: orchestrator } }
  template:
    metadata: { labels: { app: orchestrator } }
    spec:
      containers:
        - name: orchestrator
          image: ai-alert-platform/orchestrator:latest
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: orchestrator-secrets } }]
          livenessProbe: { httpGet: { path: /api/v1/health, port: 8080 }, initialDelaySeconds: 15, periodSeconds: 30 }
          readinessProbe: { httpGet: { path: /api/v1/health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: orchestrator, namespace: ai-alert-platform }
spec: { selector: { app: orchestrator }, ports: [{ port: 8080 }] }
