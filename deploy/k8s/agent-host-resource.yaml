apiVersion: apps/v1
kind: Deployment
metadata: { name: host-resource-agent, namespace: ai-alert-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: host-resource-agent } }
  template:
    metadata: { labels: { app: host-resource-agent } }
    spec:
      containers:
        - name: agent
          image: ai-alert-platform/host-resource-agent:latest
          ports: [{ containerPort: 8081 }]
          envFrom: [{ secretRef: { name: agent-host-resource-secrets } }]
          env:
            - { name: ORCHESTRATOR_URL, value: "http://orchestrator:8080" }
            - { name: AGENT_ID, value: "host-resource-agent" }
          volumeMounts: [{ name: ssh-keys, mountPath: /app/ssh_keys, readOnly: true }]
      volumes: [{ name: ssh-keys, secret: { secretName: ssh-keys, defaultMode: 256 } }]
---
apiVersion: v1
kind: Service
metadata: { name: host-resource-agent, namespace: ai-alert-platform }
spec: { selector: { app: host-resource-agent }, ports: [{ port: 8081 }] }
