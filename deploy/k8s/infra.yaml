apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: ai-alert-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env: [{ name: REDIS_PASSWORD, valueFrom: { secretKeyRef: { name: infra-secrets, key: redis-password } } }]
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: ai-alert-platform }
spec: { selector: { app: redis }, ports: [{ port: 6379 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: db, namespace: ai-alert-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: db } }
  template:
    metadata: { labels: { app: db } }
    spec:
      containers:
        - name: mysql
          image: mysql:5.7
          args: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--innodb-large-prefix=1", "--innodb-file-format=Barracuda", "--innodb-default-row-format=dynamic"]
          env:
            - { name: MYSQL_ROOT_PASSWORD, valueFrom: { secretKeyRef: { name: infra-secrets, key: db-root-password } } }
            - { name: MYSQL_DATABASE, value: ai_alert_platform }
            - { name: MYSQL_USER, valueFrom: { secretKeyRef: { name: infra-secrets, key: db-user } } }
            - { name: MYSQL_PASSWORD, valueFrom: { secretKeyRef: { name: infra-secrets, key: db-password } } }
          ports: [{ containerPort: 3306 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/mysql }]
      volumes: [{ name: data, persistentVolumeClaim: { claimName: mysql-pvc } }]
---
apiVersion: v1
kind: Service
metadata: { name: db, namespace: ai-alert-platform }
spec: { selector: { app: db }, ports: [{ port: 3306 }] }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: mysql-pvc, namespace: ai-alert-platform }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 10Gi } } }
