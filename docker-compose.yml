services:
  app:
    build: .
    ports:
      - "8082:8082"
    env_file: .env.docker
    environment:
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static
      - ssh_keys:/home/devops/.ssh:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8082

  worker:
    build: .
    command: python -m app.workers.run_worker
    env_file: .env.docker
    environment:
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ssh_keys:/home/devops/.ssh:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: host_resource_agent
      MYSQL_USER: ai_bot
      MYSQL_PASSWORD: "123"
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass 123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped

volumes:
  mysql_data:
  prometheus_data:
  ssh_keys:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.ssh
