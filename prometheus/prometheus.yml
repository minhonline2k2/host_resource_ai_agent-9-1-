# Prometheus configuration for Host Resource AI Agent
# Server 1 (172.16.50.93) scrapes Server 2 (172.16.50.147)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules
rule_files:
  - "alert_rules.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Scrape targets
scrape_configs:
  # Prometheus tự giám sát chính nó
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter trên Server 2 (target host)
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "172.16.50.147:9100"
        labels:
          env: "production"
          role: "app"

  # Nếu có thêm server target, thêm vào đây:
  # - targets:
  #     - "172.16.50.148:9100"
  #   labels:
  #     env: "production"
  #     role: "db"
