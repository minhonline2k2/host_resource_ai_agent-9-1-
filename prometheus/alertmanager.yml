# Alertmanager config - gửi alert đến AI Agent trên Server 1
# Agent API chạy trên 172.16.50.93:8082

global:
  resolve_timeout: 5m

route:
  receiver: "ai-agent"
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "ai-agent"
    webhook_configs:
      - url: "http://app:8082/api/v1/alerts/webhook"
        send_resolved: true
        http_config:
          follow_redirects: true
